{% extends "base.html" %}
{% block title %}Access Denied — CrowdFund{% endblock %}

{% block content %}
<div class="error-page">
    <div class="error-card">
        <div class="error-code">403</div>
        <h1>Access Denied</h1>
        <p>You don't have permission to perform this action. You can only edit or delete your own projects.</p>
        <div class="error-actions">
            <a href="{{ url_for('projects_list') }}" class="btn btn-primary">Back to Projects</a>
            <a href="{{ url_for('dashboard') }}" class="btn btn-ghost">Go to Dashboard</a>
        </div>
    </div>
</div>
{% endblock %}
