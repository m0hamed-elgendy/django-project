{% extends "base.html" %}
{% block title %}Access Denied — CrowdFund{% endblock %}

{% block content %}
<div class="error-layout">
    <div class="error-card">
        <div class="error-code" style="text-decoration-color: var(--stamp-red);">403</div>
        <h2 style="font-family: var(--font-heading); font-weight: 700; margin-bottom: var(--space-xs);">Access Denied</h2>
        <p class="error-msg">Permission denied. You can only modify or delete campaigns that are linked to your owner account record.</p>
        <div style="display: flex; gap: var(--space-md); justify-content: center;">
            <a href="{{ url_for('projects_list') }}" class="btn btn-primary">
                View Campaigns
            </a>
            <a href="{{ url_for('dashboard') }}" class="btn">
                Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
