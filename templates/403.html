{% extends "base.html" %}
{% block title %}Access Denied — CrowdFund{% endblock %}

{% block content %}
<div class="error-page-layout">
    <div class="error-glass-card">
        <div class="error-icon" style="color: var(--color-accent);">
            <i data-lucide="shield-alert" size="64"></i>
        </div>
        <div class="error-title">403</div>
        <h2 style="font-family: var(--font-heading); font-weight: 800; font-size: 1.75rem; margin-bottom: var(--space-sm);">Access Denied</h2>
        <p class="error-message">You do not have access rights to edit or delete someone else's campaign. Only the campaign owner may perform this action.</p>
        <div class="error-actions" style="display: flex; gap: var(--space-md); justify-content: center;">
            <a href="{{ url_for('projects_list') }}" class="btn btn-primary">
                <i data-lucide="compass" size="18"></i> View Campaigns
            </a>
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">
                <i data-lucide="layout-dashboard" size="18"></i> Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
