{% extends "base.html" %}
{% block title %}Login — CrowdFund{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card" id="login-card">
        <div class="auth-header">
            <div class="auth-logo">
                <i data-lucide="lock"></i>
            </div>
            <h2>Welcome Back</h2>
            <p>Log in to manage your active campaigns</p>
        </div>

        <form method="POST" action="{{ url_for('login') }}" class="auth-form" id="login-form" novalidate>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email"
                       value="{{ email }}"
                       placeholder="name@domain.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                       placeholder="Enter your account password" required>
            </div>

            <button type="submit" class="btn btn-primary btn-block" id="login-btn" style="margin-top: var(--space-xs);">
                Log In <i data-lucide="arrow-right" size="18"></i>
            </button>
        </form>

        <div class="auth-footer-links">
            <p>Don't have an account? <a href="{{ url_for('register') }}">Register now</a></p>
            <p>Need validation? <a href="{{ url_for('activate') }}">Activate account</a></p>
        </div>
    </div>
</div>
{% endblock %}
