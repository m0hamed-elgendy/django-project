{% extends "base.html" %}
{% block title %}Login — CrowdFund{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card" id="login-card">
        <div class="form-header">
            <h2>Welcome Back</h2>
            <p>ENTER USER CREDENTIALS FOR DASHBOARD ACCESS</p>
        </div>

        <form method="POST" action="{{ url_for('login') }}" class="auth-form" id="login-form" novalidate>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email"
                       value="{{ email }}"
                       placeholder="you@domain.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                       placeholder="Password" required>
            </div>

            <button type="submit" class="btn btn-primary btn-block" id="login-btn" style="margin-top: var(--space-xs);">
                Log In
            </button>
        </form>

        <div class="auth-footer">
            <p>Need to register? <a href="{{ url_for('register') }}">Create account</a></p>
            <p>Need to activate? <a href="{{ url_for('activate') }}">Activate account</a></p>
        </div>
    </div>
</div>
{% endblock %}
