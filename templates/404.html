{% extends "base.html" %}
{% block title %}Page Not Found — CrowdFund{% endblock %}

{% block content %}
<div class="error-layout">
    <div class="error-card">
        <div class="error-code">404</div>
        <h2 style="font-family: var(--font-heading); font-weight: 700; margin-bottom: var(--space-xs);">Page Not Found</h2>
        <p class="error-msg">The URL route requested is not registered on this server board.</p>
        <div style="display: flex; gap: var(--space-md); justify-content: center;">
            {% if session.get('user_email') %}
                <a href="{{ url_for('dashboard') }}" class="btn btn-primary">
                    Dashboard
                </a>
            {% else %}
                <a href="{{ url_for('login') }}" class="btn btn-primary">
                    Go to Login
                </a>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
