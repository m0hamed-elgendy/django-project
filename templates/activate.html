{% extends "base.html" %}
{% block title %}Activate Account — CrowdFund{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card" id="activate-card">
        <div class="auth-header">
            <div class="auth-logo" style="background: var(--gradient-accent); box-shadow: 0 8px 20px rgba(244, 63, 94, 0.25);">
                <i data-lucide="mail-open"></i>
            </div>
            <h2>Activate Account</h2>
            <p>Verify your email using your activation code</p>
        </div>

        <form method="POST" action="{{ url_for('activate') }}" class="auth-form" id="activate-form" novalidate>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email"
                       value="{{ email }}"
                       placeholder="name@domain.com" required>
            </div>

            <div class="form-group">
                <label for="activation_code">Activation Code</label>
                <input type="text" id="activation_code" name="activation_code"
                       placeholder="6-Digit Code" required
                       maxlength="6" style="text-transform: uppercase; letter-spacing: 0.3em; text-align: center; font-size: 1.3rem; font-weight: 800;">
            </div>

            <button type="submit" class="btn btn-primary btn-block" id="activate-btn" style="margin-top: var(--space-xs);">
                Activate Account <i data-lucide="shield-check" size="18"></i>
            </button>
        </form>

        <div class="auth-footer-links">
            <p>Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
            <p>Already active? <a href="{{ url_for('login') }}">Log in here</a></p>
        </div>
    </div>
</div>
{% endblock %}
