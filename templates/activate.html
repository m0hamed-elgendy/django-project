{% extends "base.html" %}
{% block title %}Activate Account — CrowdFund{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card" id="activate-card">
        <div class="form-header">
            <h2>Activate Account</h2>
            <p>VERIFY NEW ACCOUNT REGISTRATION STATUS</p>
        </div>

        <form method="POST" action="{{ url_for('activate') }}" class="auth-form" id="activate-form" novalidate>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email"
                       value="{{ email }}"
                       placeholder="you@domain.com" required>
            </div>

            <div class="form-group">
                <label for="activation_code">Activation Code</label>
                <input type="text" id="activation_code" name="activation_code"
                       placeholder="6-DIGIT CODE" required
                       maxlength="6" style="text-transform: uppercase; letter-spacing: 0.3em; text-align: center; font-size: 1.3rem; font-weight: 700;">
            </div>

            <button type="submit" class="btn btn-primary btn-block" id="activate-btn" style="margin-top: var(--space-xs);">
                Activate Account
            </button>
        </form>

        <div class="auth-footer">
            <p>Need to register? <a href="{{ url_for('register') }}">Create account</a></p>
            <p>Activated? <a href="{{ url_for('login') }}">Log in here</a></p>
        </div>
    </div>
</div>
{% endblock %}
